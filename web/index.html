<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pact PDF</title>
    <!-- Outfit and JetBrains Mono Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app-bg"></div>
    <div id="app-container">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <!-- Premium Custom Logo Mark -->
                <div class="logo-container">
                    <img id="logo-img" alt="Pact Logo" style="height: 36px; max-width: 120px; object-fit: contain; border-radius: 4px;">
                    <span class="logo-text">Pact</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-button active" id="nav-search-library" onclick="switchMainTab('search-library')">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                        <path d="m22 22-6-6"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Search & Library
                </button>
                <button class="nav-button" id="nav-stats" onclick="switchMainTab('stats')">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="m19 9-5 5-4-4-3 3"/>
                    </svg>
                    Reading Log
                </button>
            </nav>

            <!-- Continue Reading shelf -->
            <div id="continue-shelf" class="sidebar-section hidden">
                <span class="section-title">Continue Reading</span>
                <div id="continue-list" class="shelf-container"></div>
            </div>

            <!-- Active Downloads list -->
            <div id="downloads-shelf" class="sidebar-section hidden">
                <span class="section-title">
                    <svg class="icon-inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Downloads
                </span>
                <div id="downloads-list" class="shelf-container"></div>
            </div>

            <div class="sidebar-footer">
                <!-- Wallpaper Selector -->
                <div class="wallpaper-selector-container">
                    <select id="wallpaper-select" onchange="changeWallpaper(this.value)" class="wallpaper-select-dropdown" title="Select Wallpaper">
                        <option value="none">Solid Background</option>
                        <option value="neon_waves">Neon Waves</option>
                        <option value="cyberpunk_mist">Cyberpunk Mist</option>
                        <option value="aurora_glow">Aurora Glow</option>
                    </select>
                </div>
                
                <!-- Theme Toggle Switch -->
                <div id="theme-toggle" class="theme-toggle-container" onclick="toggleTheme()">
                    <div id="theme-toggle-track">
                        <div id="theme-toggle-knob">
                            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="4"/>
                                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                            </svg>
                            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <main id="main-view">
            <!-- TAB: SEARCH & LIBRARY -->
            <div id="tab-search-library" class="tab-content">
                <!-- Search Header -->
                <header class="search-header">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Search for PDFs..." onkeydown="handleSearchKey(event)">
                        <button id="search-btn" class="primary-btn" onclick="performSearch()">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.3-4.3"/>
                            </svg>
                            Search
                        </button>
                    </div>
                    <div id="search-history" class="search-history-chips"></div>
                </header>

                <div class="content-split-container">
                    <!-- Library Section -->
                    <section id="library-section" class="content-section">
                        <h2 class="section-heading">Library</h2>
                        <div id="library-grid" class="library-buckets-container"></div>
                    </section>

                    <!-- Search Results Section -->
                    <section id="search-results-section" class="content-section hidden">
                        <div class="results-header">
                            <h2 class="section-heading" id="results-heading">Search Results</h2>
                            <button class="text-btn" onclick="closeSearchResults()">Back to Library</button>
                        </div>
                        
                        <!-- Skeleton loader container -->
                        <div id="skeleton-loader" class="hidden">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>

                        <div id="search-results-list" class="results-list"></div>
                    </section>
                </div>
            </div>

            <!-- TAB: STATS -->
            <div id="tab-stats" class="tab-content hidden">
                <section class="content-section">
                    <h2 class="section-heading">Reading Log & Statistics</h2>
                    
                    <div class="stats-cards-container">
                        <div class="stats-card">
                            <span class="card-metric" id="stats-finished-month">0</span>
                            <span class="card-label">Finished This Month</span>
                        </div>
                        <div class="stats-card">
                            <span class="card-metric" id="stats-longest-read-pages">—</span>
                            <span class="card-label" id="stats-longest-read-title">Longest Read</span>
                        </div>
                    </div>

                    <div class="stats-charts-grid">
                        <div class="chart-wrapper">
                            <h3 class="chart-heading">Pages Read (Last 7 Days)</h3>
                            <div class="chart-container">
                                <div id="stats-bars" class="chart-bars"></div>
                            </div>
                        </div>

                        <div class="chart-wrapper">
                            <h3 class="chart-heading">Reading Activity Heatmap</h3>
                            <div class="heatmap-container-wrapper">
                                <div id="stats-heatmap" class="stats-heatmap-grid"></div>
                            </div>
                            <div class="heatmap-legend">
                                <span>Less</span>
                                <div class="legend-box level-0"></div>
                                <div class="legend-box level-1"></div>
                                <div class="legend-box level-2"></div>
                                <div class="legend-box level-3"></div>
                                <div class="legend-box level-4"></div>
                                <span>More</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- READER VIEW (Overlaid when active) -->
            <div id="reader-view" class="hidden">
                <!-- Reader Toolbar -->
                <div class="reader-toolbar">
                    <div class="toolbar-left">
                        <button class="icon-btn" onclick="closeReader()" title="Back to main view">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m15 18-6-6 6-6"/>
                            </svg>
                            Back
                        </button>
                        <button id="toggle-panel-btn" class="icon-btn active" onclick="toggleReaderSidePanel()" title="Toggle side panel">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect width="18" height="18" x="3" y="3" rx="2"/>
                                <path d="M9 3v18"/>
                            </svg>
                        </button>
                        <button id="focus-mode-btn" class="icon-btn" onclick="toggleFocusMode()" title="Focus Mode">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                        <div class="zoom-controls">
                            <button class="icon-btn" onclick="zoomReader(-0.5)" title="Zoom Out">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M5 12h14"/>
                                </svg>
                            </button>
                            <span id="zoom-value" class="monospace-text">100%</span>
                            <button class="icon-btn" onclick="zoomReader(0.5)" title="Zoom In">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="toolbar-center">
                        <button class="icon-btn" id="reader-prev-btn" onclick="navigateReaderPage(-1)" title="Previous Page">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m15 18-6-6 6-6"/>
                            </svg>
                        </button>
                        <span id="reader-page-indicator" class="page-indicator">0 / 0</span>
                        <button class="icon-btn" id="reader-next-btn" onclick="navigateReaderPage(1)" title="Next Page">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m9 18 6-6-6-6"/>
                            </svg>
                        </button>
                        <button class="icon-btn" id="reader-bookmark-btn" onclick="toggleCurrentPageBookmark()" title="Bookmark Page">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="toolbar-right">
                        <span id="reader-document-title" class="document-title-text">Loading...</span>
                    </div>
                </div>

                <div class="reader-split-layout">
                    <!-- Collapsible Side Panel -->
                    <aside id="reader-side-panel" class="side-panel">
                        <div class="tabs-header">
                            <button class="tab-button active" id="tab-btn-outline" onclick="switchReaderTab('outline')">Outline</button>
                            <button class="tab-button" id="tab-btn-keywords" onclick="switchReaderTab('keywords')">Keywords</button>
                            <button class="tab-button" id="tab-btn-related" onclick="switchReaderTab('related')">Related</button>
                            <button class="tab-button" id="tab-btn-notes" onclick="switchReaderTab('notes')">Notes</button>
                        </div>

                        <div class="tab-scroller">
                            <!-- Tab Content: Outline -->
                            <div id="reader-tab-outline" class="reader-tab-content">
                                <div id="outline-container" class="outline-list"></div>
                            </div>
                            <!-- Tab Content: Keywords -->
                            <div id="reader-tab-keywords" class="reader-tab-content hidden">
                                <div id="keywords-cloud" class="keywords-cloud-container"></div>
                                <div id="keyword-matches" class="keyword-matches-container hidden">
                                    <div class="keyword-matches-header">
                                        <span id="keyword-matches-title">Matches</span>
                                        <button class="close-matches-btn" onclick="clearKeywordSearch()">✕</button>
                                    </div>
                                    <div id="keyword-pages-list" class="keyword-pages-grid"></div>
                                </div>
                            </div>
                            <!-- Tab Content: Related -->
                            <div id="reader-tab-related" class="reader-tab-content hidden">
                                <div id="related-container" class="related-list"></div>
                            </div>
                            <!-- Tab Content: Notes -->
                            <div id="reader-tab-notes" class="reader-tab-content hidden">
                                <div class="note-input-container">
                                    <input type="text" id="note-entry" placeholder="Optional page note..." onkeydown="handleNoteKey(event)">
                                    <button class="primary-btn sm" onclick="saveCurrentNote()">Save Note</button>
                                </div>
                                <div id="notes-container" class="notes-list"></div>
                            </div>
                        </div>
                    </aside>

                    <!-- Scrollable Viewport -->
                    <div id="reader-viewport" class="viewport">
                        <div id="pdf-page-container">
                            <img id="pdf-page-img" alt="PDF Page Content">
                        </div>
                    </div>
                </div>

                <!-- Zen Soundscapes Panel (Visible in Focus Mode) -->
                <div id="zen-audio-panel" class="zen-panel hidden">
                    <button class="zen-play-btn" onclick="toggleZenAudio()" title="Play/Pause Ambient Sound">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        <svg class="pause-icon hidden" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16"/>
                            <rect x="14" y="4" width="4" height="16"/>
                        </svg>
                    </button>
                    <select id="zen-sound-select" onchange="changeZenSound(this.value)" class="zen-select">
                        <option value="https://www.soundjay.com/nature/sounds/rain-07.mp3">🌧️ Rain</option>
                        <option value="https://assets.mixkit.co/music/preview/mixkit-dreaming-big-31.mp3">🎵 Lofi Beats</option>
                        <option value="https://www.soundjay.com/nature/sounds/forest-birds-01.mp3">🌳 Forest Birds</option>
                    </select>
                    <div class="zen-volume-container">
                        <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                        <input type="range" id="zen-volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeZenVolume(this.value)" class="zen-slider">
                    </div>
                    <audio id="zen-audio-element" loop></audio>
                </div>
            </div>
        </main>

        <!-- Status Toast Banner -->
        <div id="status-toast" class="toast-hidden"></div>

        <!-- Tag Prompt Modal -->
        <div id="tag-modal" class="modal-overlay hidden">
            <div class="modal-card">
                <h3>Add Tag</h3>
                <p>Tag this document:</p>
                <input type="text" id="tag-input" placeholder="e.g. Artificial Intelligence" onkeydown="handleTagKey(event)">
                <div class="modal-buttons">
                    <button class="secondary-btn" onclick="closeTagModal()">Cancel</button>
                    <button class="primary-btn" onclick="saveTagPrompt()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
